name: Build LaTeX Document

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra tex-gyre

      - name: Setup TeX Live
        uses: teatimeguest/setup-texlive-action@v3
        with:
          package-file: |
            nwputhesis-sample.tex
            nwputhesis.cls
          cache: true

      - name: Build document (XeLaTeX + BibTeX)
        run: |
          xelatex -interaction=nonstopmode nwputhesis-sample.tex
          bibtex nwputhesis-sample
          xelatex -interaction=nonstopmode nwputhesis-sample.tex
          xelatex -interaction=nonstopmode nwputhesis-sample.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: nwputhesis-pdf
          path: nwputhesis-sample.pdf
          retention-days: 30